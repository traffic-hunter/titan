name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test Go CLI
        working-directory: titan-cli
        run: go test ./...

      - name: Build
        run: ./gradlew --no-daemon -PversionName="${GITHUB_REF_NAME}" clean build --stacktrace

      - name: Build Go CLI
        shell: bash
        working-directory: titan-cli
        run: |
          set -euo pipefail

          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="titan-cli-${GITHUB_REF_NAME}-${os}-${arch}"

            GOOS="${os}" GOARCH="${arch}" go build \
              -ldflags "-X main.version=${GITHUB_REF_NAME}" \
              -o "dist/${name}/titan" \
              .

            tar -C "dist/${name}" -czf "dist/${name}.tar.gz" titan
          done

          os="windows"
          arch="amd64"
          name="titan-cli-${GITHUB_REF_NAME}-${os}-${arch}"

          GOOS="${os}" GOARCH="${arch}" go build \
            -ldflags "-X main.version=${GITHUB_REF_NAME}" \
            -o "dist/${name}/titan.exe" \
            .

          (cd "dist/${name}" && zip -q "../${name}.zip" titan.exe)

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets
          server_jar="bootstrap/build/libs/titan-server-${GITHUB_REF_NAME}.jar"

          test -f "${server_jar}"
          cp "${server_jar}" release-assets/
          cp titan-cli/dist/titan-cli-"${GITHUB_REF_NAME}"-*.tar.gz release-assets/
          cp titan-cli/dist/titan-cli-"${GITHUB_REF_NAME}"-*.zip release-assets/

          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --verify-tag --title "Release ${GITHUB_REF_NAME}" --generate-notes

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew --no-daemon -PversionName="${GITHUB_REF_NAME}" publishAndReleaseToMavenCentral
