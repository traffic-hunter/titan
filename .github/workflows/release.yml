name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew --no-daemon -PversionName="${GITHUB_REF_NAME}" clean build --stacktrace

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets
          server_jar="bootstrap/build/libs/titan-server-${GITHUB_REF_NAME}.jar"

          test -f "${server_jar}"
          cp "${server_jar}" release-assets/

          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/*.jar --verify-tag --title "Release ${GITHUB_REF_NAME}" --generate-notes

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew --no-daemon -PversionName="${GITHUB_REF_NAME}" publishAndReleaseToMavenCentral

      - name: Update README and docs version
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          ./gradlew --no-daemon updateReleaseDocsVersion -PreleaseVersion="${GITHUB_REF_NAME}"

          if git diff --quiet -- README.md docs/examples; then
            echo "README and docs already reference ${GITHUB_REF_NAME}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/examples
          git commit -m "Update docs for ${GITHUB_REF_NAME}"
          git push origin main
