name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew --no-daemon -PversionName="${GITHUB_REF_NAME}" clean build

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          while IFS= read -r jar; do
            [[ "$jar" == *"-plain.jar" ]] && continue

            size="$(wc -c < "$jar" | tr -d ' ')"
            [[ "$size" -le 1024 ]] && continue

            module="${jar%%/build/libs/*}"
            module="${module#./}"
            module="${module//\//-}"
            file="$(basename "$jar")"
            cp "$jar" "release-assets/${module}-${file}"
          done < <(find . -path "*/build/libs/*.jar" -type f | sort)

          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/*.jar --verify-tag --title "Release ${GITHUB_REF_NAME}" --generate-notes

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew --no-daemon -PversionName="${GITHUB_REF_NAME}" publishAndReleaseToMavenCentral
